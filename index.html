<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nak2 Album Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js"></script>
</head>

<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-4xl font-bold mb-8 text-center">Nak2 Media Gallery</h1>

    <div class="flex gap-2 mb-8">
      <button data-filter="all"
        class="filter-btn px-5 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium transition-colors">
        All
      </button>
      <button data-filter="image"
        class="filter-btn px-5 py-2 bg-zinc-800 text-zinc-300 rounded-xl text-sm font-medium transition-colors">
        Photos
      </button>
      <button data-filter="video"
        class="filter-btn px-5 py-2 bg-zinc-800 text-zinc-300 rounded-xl text-sm font-medium transition-colors">
        Videos
      </button>
    </div>

    <!-- Controls 
    <div class="flex flex-wrap gap-4 mb-8 bg-zinc-900 p-4 rounded-xl">
      <input id="search" type="text" placeholder="Search captions or tags..."
        class="flex-1 bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">

      <div class="flex gap-2">
        <input id="dateFrom" type="date" class="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2">
        <span class="self-center">to</span>
        <input id="dateTo" type="date" class="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2">
      </div>

      <div class="flex gap-4">
        <label><input type="checkbox" id="filterImages" checked> Images</label>
        <label><input type="checkbox" id="filterVideos" checked> Videos</label>
      </div>

      <button onclick="clearFilters()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg">Clear</button>
    </div>
  -->

    <!-- Tags cloud -->
    <div id="tagCloud" class="flex flex-wrap gap-2 mb-8"></div>

    <!-- Gallery grid -->
    <div id="gallery" class="grid grid-cols-1 gap-0"> <!-- Changed from previous grid classes -->
    </div>
  </div>

  <!-- Lightbox modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4">
    <div class="w-full max-w-[96vw] max-h-[96vh] bg-zinc-900 rounded-3xl overflow-hidden flex flex-col">
      <div id="modalContent" class="flex-1 flex items-center justify-center bg-black p-6 overflow-hidden"></div>
      <div id="modalMeta" class="bg-zinc-900 border-t border-zinc-800 p-6"></div>
    </div>
    <button id="modalPrev"
      class="absolute left-3 md:left-6 top-1/2 -translate-y-1/2 z-10 bg-black/50 hover:bg-black/70 text-white w-12 h-12 rounded-full text-3xl leading-none flex items-center justify-center">
      ‹
    </button>

    <button id="modalNext"
      class="absolute right-3 md:right-6 top-1/2 -translate-y-1/2 z-10 bg-black/50 hover:bg-black/70 text-white w-12 h-12 rounded-full text-3xl leading-none flex items-center justify-center">
      ›
    </button>
  </div>

</body>

</html>
