name: Update iCloud Album

on:
  schedule:
    - cron: '0 */2 * * *'     # Every 2 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # Important for reliable diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Update index and thumbnails
        run: npm run update
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Check for changes
        id: git-check
        run: |
          echo "=== Checking for changes in iCloud album ==="

          # Stronger check using git diff-index - catches new files, modified files, and deletions
          if git diff-index --quiet HEAD -- index.json thumbnails/; then
            echo "✅ No changes detected - skipping commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "📸 Changes detected:"
            git diff-index --name-only HEAD -- index.json thumbnails/
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes only if updated
        if: steps.git-check.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update iCloud album index and thumbnails"
          file_pattern: |
            index.json
            thumbnails/*.jpg
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com