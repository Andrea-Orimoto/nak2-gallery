name: Update iCloud Album

on:
  schedule:
    - cron: '0 */4 * * *'     # Every 4 hours (recommended for reducing expired links)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Update index and thumbnails
        run: npm run update
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Commit changes only if updated
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update iCloud album index and thumbnails"
          file_pattern: |
            index.json
            thumbnails/*.jpg
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com