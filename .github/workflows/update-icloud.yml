name: Update iCloud Album Index

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    # Force Node.js 24 for all JavaScript actions to silence deprecation warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Update index and generate thumbnails
        run: npm run update

      - name: Commit changes (index + thumbnails)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update iCloud album index and thumbnails"
          file_pattern: |
            index.json
            thumbnails/*.jpg
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com